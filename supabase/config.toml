# Supabase local development config
# Docs: https://supabase.com/docs/guides/local-development

[api]
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
port = 54323

[inbucket]
port = 54324

[storage]
file_size_limit = "50MiB"

[auth]
site_url = "https://olaac.org"
additional_redirect_urls = [
  "https://olaac.org/auth/callback",
  "https://academia.olaac.org/auth/callback",
  "http://localhost:3000",
  "http://localhost:3000/auth/callback",
  "http://localhost:3001",
  "http://localhost:3001/auth/callback",
]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
otp_length = 6
otp_expiry = 3600

[auth.email.smtp]
enabled = true
host = "email-smtp.us-east-2.amazonaws.com"
port = 587
user = "env(AWS_ACCESS_KEY_ID)"
pass = "env(SES_SMTP_PASSWORD)"
admin_email = "no-reply@olaac.org"
sender_name = "OLAAC Observatorio"

[auth.email.template.confirmation]
subject = "Tu código de verificación — OLAAC"
content_path = "./supabase/templates/otp.html"

[auth.email.template.magic_link]
subject = "Tu código de verificación — OLAAC"
content_path = "./supabase/templates/otp.html"
